################################
# ROLES & PERMISSION
################################
type Roles @model @auth(rules: [{ allow: public }]) {
  id: ID! @primaryKey
  name: String!
  displayName: String!
  icon: String!
  
  #Relations
  rolPermissions: [Permissions] @manyToMany(relationName: "RolPermissions")
}

type Permissions @model @auth(rules: [{ allow: public }]) {
  id: ID! @primaryKey
  displayName: String!
  name: String!
  icon: String!
  order: Int @default(value: "99")
  
  #Relations
  Padre: Permissions @belongsTo
  Submenu: [Permissions] @hasMany
  rolPermissions: [Roles] @manyToMany(relationName: "RolPermissions")
  userPermissions: [Users] @manyToMany(relationName: "UserPermissions")
}


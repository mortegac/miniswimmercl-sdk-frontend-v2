################################
# ENVIO DE EMAILS
################################
type EmailSend @model {
  id: ID! @primaryKey
  # id: ID! @primaryKey(sortKeyFields: ["typeSend"])
  date: AWSDateTime
  typeSend: TypeSend! @default(value: "NONE")
  type: TypeOfEmail!
  contentEmail: String @default(value: "")  # EMAIL CONTENT
  contentMessage: String @default(value: "") # WHATSAPP CONTENT
  phone: String @default(value: "") 
  phoneState: EmailState  @default(value: "SEND") 
  email: String @default(value: "") 
  emailState: EmailState  @default(value: "SEND") 
  
  #Relations 
  studentId: ID! @index(name: "byStudentEmailSendId") @default(value: "SIN-ESTUDIANTE")  # Made non-null
  student: Student! @belongsTo(fields: ["studentId"])
  
  userSendId: ID! @index(name: "byUserSend") @default(value: "SIN-USUARIO")  # User que envio el email
  userSend: Users! @belongsTo(fields: ["userSendId"])
  
  enrollmentId: ID @index(name: "byEnrollment")  # Nueva relación opcional con Enrollment
  enrollment: Enrollment @belongsTo(fields: ["enrollmentId"])

}
enum TypeOfEmail {
  WHATSAPP
  WHATSAPP_LINK_PAGO     #
  WHATSAPP_LINK_RENOVACION     #
  WELCOME     # ESCUELA | Email de bienvenida
  NOSESSION   # ESCUELA | Email de Renovacion 
  UPDATE_SESSION   # ESCUELA | SESION REAGENDADA
}
enum TypeSend {
  NONE
  WHATSAPP
  EMAIL
}


enum EmailState {
  SEND
  REJECT
  DELIVERY
  SUBSCRIPTION
  COMPLAINT
  OPEN
  DELIVERYDELAY
  CLICK
  RENDERING_FAILURE
  BOUNCE
}

type SentEmail @model @auth(rules: [{ allow: public }]) { #tabla de emails de invitacion enviados
  id: ID! @primaryKey
  emailState: EmailState
  body: String @default(value: "")
}

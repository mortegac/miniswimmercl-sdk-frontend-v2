# type Users @model {
#   id: ID! @primaryKey
#   studentEvaluations: [StudentEvaluations] @hasMany
# }


type EvaluationLevel @model {
  id: ID! @primaryKey
  ico: String
  name: String
  description: String
  startingAge: Float
  endingAge: Float
  order: Int
  
  #Relations
  evaluationObjectives: [EvaluationObjetives] @hasMany
  studentEvaluations: [StudentEvaluations] @hasMany
  
 # Relación con Users
  
}

type EvaluationObjetives @model {
  id: ID! @primaryKey
  texto: String
  isMandatory: Boolean @default(value: "false")
  evaluationLevel: EvaluationLevel @belongsTo
  studentEvaluationsDetails: [StudentEvaluationsDetail] @hasMany
  isActive: Boolean @default(value: "true")
}

# type Student @model {
#   id: ID! @primaryKey
#   studentEvaluations: [StudentEvaluations] @hasMany
#   studentEvaluationsDetails: [StudentEvaluationsDetail] @hasMany
# }

type StudentEvaluations @model {
  id: ID! @primaryKey
  # id: ID! @primaryKey(sortKeyFields: ["studentId"])
  date: AWSDateTime
  previousLevel: String
  sessionsCarriedOut: Int
  age: Float
  wasApproved: Boolean
  observations: String
  
  # Relations
  studentId: ID!
  evaluationLevelId: ID!
  
  student: Student @belongsTo(fields: ["studentId"])
  evaluationLevel: EvaluationLevel @belongsTo(fields: ["evaluationLevelId"])
  studentEvaluationsDetails: [StudentEvaluationsDetail] @hasMany(fields: ["id"])
  
  userId: ID!  # Clave foránea para Users/ Profesores
  user: Users @belongsTo(fields: ["userId"]) 
  # user: Users @belongsTo
  # student: Student @belongsTo
  # user: Users @belongsTo
  # evaluationLevel: EvaluationLevel @belongsTo
  # studentEvaluationsDetails: [StudentEvaluationsDetail] @hasMany
}

type StudentEvaluationsDetail @model {
  id: ID! @primaryKey
  text: String
  wasAchieved: Boolean
  studentEvaluationId: ID!
  studentEvaluation: StudentEvaluations @belongsTo(fields: ["studentEvaluationId"])
  evaluationObjectiveId: ID!
  evaluationObjective: EvaluationObjetives @belongsTo(fields: ["evaluationObjectiveId"])
}
################################
# ENVIO DE EMAILS
################################
type EmailSend @model {
  id: ID! @primaryKey
  date: AWSDateTime
  type: TypeOfEmail!
  
  email: String @default(value: "") 
  studentName: String @default(value: "")   
  studentId: String @default(value: "")   
  totalSessions: String @default(value: "")   
  session1: String @default(value: "")   
  session2: String @default(value: "")   
  session3: String @default(value: "")   
  session4: String @default(value: "")   
  session5: String @default(value: "")   
  session6: String @default(value: "")   
  session7: String @default(value: "")   
  session8: String @default(value: "")
  urlCancellationPolicies: String @default(value: "")
  courseName: String @default(value: "")  #Nombre del curso 
  courseSchedule: String @default(value: "")  #Horario del curso 
  
  imageMap: String @default(value: "")  #URL de la imagen del mapa 
  urlMap: String @default(value: "")  #URL de google maps de la direccion
  directions: String @default(value: "")  #Indicaciones para la llegada
  
  #Relations 
  user: Users! @belongsTo
  
}
enum TypeOfEmail {
  WELCOME     # ESCUELA | Email de bienvenida
  NOSESSION   # ESCUELA | Email de Renovacion 
}


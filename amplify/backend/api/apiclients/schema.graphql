# # This "input" configures a global authorization rule to enable public access to
# # all models in this schema. Learn more about authorization rules here: https://docs.amplify.aws/cli/graphql/authorization-rules
input AMPLIFY { globalAuthRule: AuthRule = { allow: public } } # FOR TESTING ONLY!



################################
# USUARIOS
################################
type Users @model {
  id: ID! @primaryKey
  name: String!
  email: String!
  validated: Boolean
  contactPhone: String @default(value: "")
  ig: String @default(value: "")
  firstContact: Boolean   # Se usa para saber si hayq ue pedirle mas info al user
  
  #Relations
  relationships: [Relationship] @hasMany
  userTickets: [SupportTicket] @manyToMany(relationName: "TicketUser")
  roles: Roles @hasOne
  userPermissions: [Permissions] @manyToMany(relationName: "UserPermissions")
  
}


################################
# RELACIONES USUARIOS-STUDENTS
################################
type Relationship @model {
  id: ID! @primaryKey
    
  #Relations 
  user: Users! @belongsTo
  student: Student! @belongsTo
  relationType: RelationType!
}
enum RelationType {
  NONE
  OTHER
  MOTHER
  FATHER
  GRANDFATHER
  GRANDMOTHER
  UNCLE
  AUNT
  FAMILYS_FRIEND
  COUSIN
}


################################
# ESTUDIANTES - SESSIONES INSCRITAS
################################
type Student @model {
  id: ID! @primaryKey
  name: String!
  lastName: String!
  middleName: String!
  birthdate: String!
  placeOfResidence: String!
  contactPhone: String!
  whoIsTheContact: String!
  emailPhone: String!
  gender: String!
  
  firstSwimmingClass: Boolean @default(value: "false")                   #| El alumno, ¿ Es primera vez que toma clases de natación ?
  attendedDaycare: Boolean @default(value: "false")                       #| ¿ Asiste o asistió a sala cuna o jardín ?
  immersesWithoutSwallowingWater: Boolean @default(value: "false")        #|  ¿ Se sumerge sin tragar agua ?
  bornPrematurely: Boolean @default(value: "false")                       #|  ¿ Nació Prematuro ?
  waterOnHisFaceBothersHim: Boolean @default(value: "false")              #|  ¿ Le molesta el agua en la cara ?
  putYourFaceInTheWater: Boolean @default(value: "false")                 #|  ¿ Mete la cara al agua ?

  anyIllnessInjuryMedicalCondition: String!      #|  ¿ Tiene alguna enfermedad, lesión o condición médica ?
  
 
  #Relations
  enrollments: [Enrollment] @hasMany
  relationships: [Relationship] @hasMany
  sessionDetail: SessionDetail @hasOne
}


#####################################################
# SESSIONES DE CURSOS INSCRITAS DEL STUDIANTE
#####################################################
type Enrollment @model {  
  id: ID! @primaryKey
  amountPaid: Float!
  startDate: String!
  endDate: String!  
  wasPaid: Boolean @default(value: "false")
  timeAWeek: Float          # Cantidad de veces por semana contratadas
  numberOfSessions: Int!    # Cantidad de sesiones contratadas
  sessionsLeft: Float       # sesiones restantes
  sessionsUsed: Float       # sesiones usadas
  
  
  #Relations  
  student: Student! @belongsTo
  sessionType: SessionType! @belongsTo
  course: Course! @belongsTo
  transaction: Transaction @hasOne   # Relacion ono to one con la transaccion del pago
  sessionDetails: [SessionDetail] @hasMany
}

################################
# DETALLE DE SESIONES CONTRATADAS
################################
enum SessionStatus {
  ACTIVE
  USED
  RECOVERED
}

type SessionDetail @model {
  id: ID!
  date: AWSDateTime
  month: String!
  year: String
  sessionNumber: Int      # Sesion numero
  totalSessions: Int      # Total de sesiones del pack
  status: SessionStatus!
  proratedValue: Float @default(value: "0")  #Valor de la sesion prorraterado por lo que pago
  wasEmailSent: Boolean @default(value: "false")
  
  #Relation
  enrollment: Enrollment! @belongsTo
  student: Student! @belongsTo
}

################################
# TRANSACCIONES - PAGOS
################################
type Transaction @model {
  id: ID! @primaryKey
  amount: Float!
  date: AWSDateTime!
  paymentMethod: String!
  status: String @default(value: "")
    
  #Relations  
  enrollment: Enrollment! @belongsTo
}

################################
# SEDES | locations
################################
type Location @model {
  id: ID! @primaryKey
  name: String @default(value: "")
  city: String @default(value: "")
  minimumTemperature:  Int @default(value: "28")
  maximumTemperature:  Int @default(value: "30")
  address: String @default(value: "")
  phone: String @default(value: "")
  
  #Relations
  courses: [Course] @hasMany                  # relación una location tiene muchos cursos
  schedules: [Schedule] @hasMany
  expenses: [Expense] @hasMany
}


################################
# GASTOS 
################################
type Expense @model {
  id: ID! @primaryKey
  amount: Float!
  description: String
  date: AWSDateTime!
  day: Int!
  month: Int!
  year: Int!
  expenseType: ExpenseType!         # TIPO DE GASTO
  costCenterType: CostCenterType!         # CENTRO DE COSTO ASOCIADO
  
  # Relation
  location: Location! @belongsTo
}

enum CostCenterType {
  VITACURA_PISCINA_MUNICIPAL
  LA_REINA_PISCINA_MUNICIPAL
  MATERIALS
  RRHH
  ADS
  OTHERS
}

enum ExpenseType {
  POOL_COURT_RENTAL
  MATERIALS
  TEACHER
  ASSISTANT
  ADS_IG
  OTHERS
}

################################
# CURSOS
################################
type Course @model {
  id: ID! @primaryKey
  title: String!
  description: String
  startingAge: Float        # Edad de inicio
  endingAge: Float          # Edad Final
  ageType: AgeType!         # Edad registrada en meses o años
  AgeGroupType: AgeGroupType!         # GRUPO ETAREO DIRIGIDO EL CURSO
  
  
  duration: String!
  
  isActive: Boolean @default(value: "false")
  
  #Relations
  location: Location @belongsTo               # relación muchos a uno.
  schedules: [Schedule] @hasMany              # relación uno a muchos
  sessionTypes: [SessionType] @manyToMany(relationName: "CourseSessionType")
  enrollments: [Enrollment] @hasMany  
  # CourseStudentsRelation: [CoursesStudentsRelations] @hasMany
  # coursesLocationRelation: [Locations] @manyToMany(relationName: "CoursesLocations")
}

enum AgeGroupType {
  ALL
  BABIES
  CHILDREN
  ADULTS
  PREGNANT
  OLDER_ADULTS
}
enum AgeType {
  MONTHS
  YEARS  
}


################################
# CURSOS | CONFIGURACION HORARIOS - SESSIONES
################################
type Schedule @model {
  id: ID! @primaryKey
  day: DayType!         # Dia en que se imparte
  startHour: String!
  endHour: String!
  
  #Relations
  course: Course @belongsTo
  location: Location @belongsTo
}

enum DayType {
  lunes
  martes
  miercoles
  jueves
  viernes
  sabado
  domingo
}
type SessionType @model {
  id: ID! @primaryKey
  name: String!
  description: String
  durationSession: Int @default(value: "0")        # Duración de cada sesion en minutos
  timeAWeek: Float          # Cantidad de veces por semana contratadas
  totalSessions: Float        # Cantidad de sesiones
  amount: Float
  
  #Relations
  courses: [Course] @manyToMany(relationName: "CourseSessionType")
  enrollments: [Enrollment] @hasMany
}






################################
# ROLES & PERMISSION
################################
type Roles @model @auth(rules: [{ allow: public }]) {
  id: ID! @primaryKey
  name: String!
  displayName: String!
  icon: String!
  
  #Relations
  rolPermissions: [Permissions] @manyToMany(relationName: "RolPermissions")
}

type Permissions @model @auth(rules: [{ allow: public }]) {
  id: ID! @primaryKey
  displayName: String!
  name: String!
  icon: String!
  order: Int @default(value: "99")
  
  #Relations
  Padre: Permissions @belongsTo
  Submenu: [Permissions] @hasMany
  rolPermissions: [Roles] @manyToMany(relationName: "RolPermissions")
  userPermissions: [Users] @manyToMany(relationName: "UserPermissions")
}


################################
# TICKETS - COMENTARIOS
################################
type SupportTicket @model @auth(rules: [{ allow: public }]) {
  id: ID!
  name: String!
  email: String!
  phoneNumber: String!
  description: String!
  date: String!
  day: String!
  month: String!
  year: String @default(value: " ")
  lastModificationUser: String @default(value: "sin-usuario")
  statusTicket: statusTicketType @default(value: "open")
  reason: reasonType @default(value: "none")
  
  #Relations
  userTickets: [Users] @manyToMany(relationName: "TicketUser")
  ticketComments: [CommentTickets] @manyToMany(relationName: "Comments")
}

enum reasonType {
  none
  return_session
  payment_problem
  other
}
enum statusTicketType {
  open
  in_progress
  resolved
  does_not_apply
}

type CommentTickets @model @auth(rules: [{ allow: public }]) {
  id: ID!
  description: String!
  statusModificationIdUser: String @default(value: "sin-usuario")
  statusModificationUser: String @default(value: "sin-usuario")
  
  #Relations
  ticketComments: [SupportTicket] @manyToMany(relationName: "Comments")
}



##########################################################
# PARAMETERS
##########################################################
type ParametersEnc @model @auth(rules: [{ allow: public }]) {
  id: ID! @primaryKey
  typeOfParameter: [Parameters] @hasMany
  description: String
}

type Metadata @model @auth(rules: [{ allow: public }]) {
  id: ID!
  key: String
  value: String
  metadata: Parameters @belongsTo
}

type Parameters @model @auth(rules: [{ allow: public }]) {
  id: ID! @primaryKey
  typeOfParameter: ParametersEnc @belongsTo
  label: String!
  value: String!
  idParent: String @default(value: "") #Id Parametro Padre, ejemplo de uso regiones con sus comunas
  metadata: [Metadata] @hasMany
}

################################
# CUSTOM RESOLVERS
################################

type Mutation {
  generateEnrollment(studentId: String!, startDate: String!, sessionTypeId: String!, scheduleId: String!, courseId: String!): String
    @function(name: "fnCalculateSessionsEnrollment-${env}")
}



################################
# ACADEMIA 
################################

type AcademyStudents @model {
  id: ID! @primaryKey
  name: String!
  email: String!
  birthdate: AWSDateTime!
  years: Int!
  address: String @default(value: "") 
  phone: String @default(value: "")
  profession: String @default(value: "")
  studiesRelated: String @default(value: "")  #Estudios relacionados al área de la formación
  medicalHistory: String @default(value: "")  #Antecedentes médicos
  emergencyContact: String @default(value: "")  #Contacto de emergencia
  isPaid: Boolean   #Campo momentaneao para saber si esta pagado el curso
}